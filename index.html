<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>전문가용 사주 만세력</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f4f2; padding: 20px; }
        .container { max-width: 500px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin: auto; }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; font-size: 14px; color: #555; }
        input, select, button { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; }
        button { background-color: #2c3e50; color: white; border: none; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 15px; }
        button:hover { background-color: #1a252f; }
        #result { margin-top: 20px; padding: 15px; background-color: #e9ecef; border-radius: 5px; display: none; }
        pre { white-space: pre-wrap; word-wrap: break-word; font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🌙 정통 사주 만세력</h2>
        
        <div class="form-group">
            <label>생년월일</label>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="year" placeholder="년(YYYY)" value="1995">
                <input type="number" id="month" placeholder="월(MM)" value="10">
                <input type="number" id="day" placeholder="일(DD)" value="15">
            </div>
        </div>
        
        <div class="form-group">
            <label>태어난 시간</label>
            <input type="time" id="time" value="23:40">
        </div>
        
        <div class="form-group">
            <label>양력/음력 선택</label>
            <select id="is_lunar">
                <option value="false">양력</option>
                <option value="true">음력</option>
            </select>
        </div>
        
        <button onclick="getSaju()">사주 명식 뽑기</button>

        <div id="result">
            <h4>📜 분석 결과</h4>
            <pre id="resultText"></pre>
        </div>
    </div>

    <script>
        async function getSaju() {
            const year = document.getElementById('year').value;
            const month = document.getElementById('month').value;
            const day = document.getElementById('day').value;
            const time = document.getElementById('time').value;
            const is_lunar = document.getElementById('is_lunar').value;

            // 로딩 메시지 띄우기 (AI가 글을 쓰는 동안 기다려달라는 표시)
            document.getElementById('resultText').innerHTML = "<b>AI 역술가가 사주를 분석하며 풀이 글을 작성하고 있습니다. 잠시만 기다려주세요... ⏳</b>";
            document.getElementById('result').style.display = 'block';

            const url = `/get_saju?year=${year}&month=${month}&day=${day}&time=${time}&is_lunar=${is_lunar}`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                // 화면에 예쁘게 결과 출력하기
                let resultHtml = `
                    <h4>📜 명식 데이터</h4>
                    <p><strong>보정된 시간:</strong> ${data.expert_correction.real_solar_time} (야자시: ${data.expert_correction.yaja_shi_applied})</p>
                    <p><strong>사주팔자:</strong> <span style="font-size:1.3em; color:#d35400;"><b>${data.full_saju}</b></span></p>
                    <hr style="border:1px dashed #ccc; margin: 20px 0;">
                    <h4>🤖 AI 사주 풀이</h4>
                    <div style="line-height: 1.6; font-size: 15px; white-space: pre-wrap;">${data.ai_reading}</div>
                `;
                document.getElementById('resultText').innerHTML = resultHtml;

            } catch (error) {
                alert("서버 오류가 발생했습니다. 터미널을 확인해주세요!");
            }
        }
    </script>
</body>
</html>
